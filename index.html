<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="event-site">
        <section class="hero">
            <div class="flower">{{icon}}</div>
            <span>{{title}}</span>
            <p>{{message}}</p>
            <h1>{{names}}</h1>
        </section>

        <section class="info">
            <div class="info-box">
                <div>
                    <small>التاريخ</small>
                    <strong>{{date}}</strong>
                </div>

                <div>
                    <small>الموقع</small>
                    <strong>{{location}}</strong>
                </div>
            </div>
        </section>

        <section class="closing">
            <h2>{{closing}}</h2>
        </section>
    </main>

</body>

</html>
